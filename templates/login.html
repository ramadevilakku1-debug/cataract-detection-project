<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cataract Detection Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .login-container {
            margin-top: 100px;
        }
        .card {
            background-color: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            border: 1px solid #0ff;
            border-radius: 0;
        }
        .card-header {
            background-color: rgba(0, 255, 255, 0.2);
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
        }
        .form-label {
            color: #0ff;
        }
        .form-control {
            background-color: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 1px solid #0ff;
        }
        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            border-color: #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .btn-primary {
            background-color: #0ff;
            color: #000;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #000;
            color: #0ff;
            border: 1px solid #0ff;
        }
        h1 {
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-align: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.pinimg.com/originals/e5/3a/69/e53a6926e29499539899599b940b9c94.gif') repeat;
            opacity: 0.3;
            z-index: -1;
        }
    </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Cataract Detection Project</a>
    </div>
  </nav>
    <div class="container login-container">
        <h1>Login</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        Login
                    </div>
                    <div class="card-body">
                        <form action="/login" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Login</button>
<p class="mt-3"><span style="color:whitesmoke; font-weight: bold;">Don't have an account?</span> <a href="/register">Register</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
